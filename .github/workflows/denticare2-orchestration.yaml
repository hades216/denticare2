# More information under https://docs.ionos.space/docs/github-actions-customization/
# version: 2022-07-21

name: "Deploy Now: Orchestration"
run-name: "Deploy Now: Build denticare2 · ${{ github.event.head_commit.message || format('Triggered by {0}', github.triggering_actor) }}"

on:
  - push
  - workflow_dispatch

jobs:
  retrieve-project:
    name: check readiness
    runs-on: ubuntu-latest
    outputs:
      deployment-enabled: ${{ fromJson(steps.project.outputs.info).deployment-enabled }}
      branch-id: ${{ fromJson(steps.project.outputs.info).branch-id }}
    steps:
      - name: Fetch project data
        uses: ionos-deploy-now/project-action@v1
        id: project
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-us.ionos.space
          project-id: 00b965dc-3224-4d71-84d0-6c4599f41b03
          action: retrieve-info


  build:
    name: build denticare2
    needs: retrieve-project
    if: ${{ needs.retrieve-project.outputs.deployment-enabled == 'true' }}
    runs-on: ubuntu-22.04
    env:
      DEPLOYMENT_FOLDER: dist
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Environment Diagnostics
        shell: bash
        run: |
          echo "Current directory: $(pwd)"
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "NPM location: $(which npm)"
          echo "Shell: $SHELL"
          ls -la

      - name: Install Dependencies
        shell: bash
        run: |
          npm install --no-audit --no-fund

      - name: Build Assets
        env:
          CI: true
          SITE_URL: https://IONOS_DEPLOY_NOW_SITE_URL
        shell: bash
        run: |
          npm run build

      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-us.ionos.space
          project-id: 00b965dc-3224-4d71-84d0-6c4599f41b03
          branch-id: ${{ needs.retrieve-project.outputs.branch-id }}
          version: ${{ github.sha }}
          folder: ${{ env.DEPLOYMENT_FOLDER }}
          config-file: .deploy-now/config.yaml
          action: upload

  deploy:
    name: trigger deployment
    needs:
      - retrieve-project
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deployment(s)
        uses: ionos-deploy-now/project-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-us.ionos.space
          project-id: 00b965dc-3224-4d71-84d0-6c4599f41b03
          branch-id: ${{ needs.retrieve-project.outputs.branch-id }}
          action: dispatch-deployments
